<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --cream: #f7f3ee;
      --warm: #e8dfd4;
      --accent: #c8692a;
      --accent-dark: #a3521e;
      --muted: #8a7f74;
      --border: #d5ccc3;
      --error: #c0392b;
      --success: #27673a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Left panel */
    .panel-left {
      width: 45%;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 60%, rgba(200,105,42,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--cream);
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--accent); }

    .panel-tagline {
      z-index: 1;
    }

    .panel-tagline h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      color: var(--cream);
      line-height: 1.12;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .panel-tagline h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .panel-tagline p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 320px;
    }

    .panel-footer {
      font-size: 12px;
      color: #4a4540;
    }

    /* Decorative circles */
    .deco {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200,105,42,0.15);
    }
    .deco-1 { width: 320px; height: 320px; right: -80px; top: -80px; }
    .deco-2 { width: 180px; height: 180px; right: 40px; top: 80px; border-color: rgba(200,105,42,0.25); }
    .deco-3 { width: 500px; height: 500px; right: -200px; bottom: -200px; }

    /* Right panel */
    .panel-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: var(--cream);
    }

    .form-container {
      width: 100%;
      max-width: 400px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .tab-btn.active {
      color: var(--ink);
    }

    .tab-btn.active::after {
      transform: scaleX(1);
    }

    /* Forms */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .form-section p.subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,105,42,0.1);
    }

    input::placeholder { color: #c0b8b0; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { background: var(--border); cursor: not-allowed; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s ease;
      z-index: 999;
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); color: white; }
    .toast.error { background: var(--error); color: white; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .panel-left { display: none; }
      .panel-right { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <div class="panel-left">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
    <div class="brand">My<span>Store</span></div>
    <div class="panel-tagline">
      <h1>Shop with <em>intention.</em></h1>
      <p>Curated products, seamless experience. Join thousands of customers who trust us for quality.</p>
    </div>
    <div class="panel-footer">© 2025 MyStore. All rights reserved.</div>
  </div>

  <div class="panel-right">
    <div class="form-container">

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div class="form-section active" id="tab-login">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue to your account</p>

        <div class="field">
          <label>Email Address</label>
          <input id="loginEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••">
        </div>
        <button class="btn-primary" id="loginBtn" onclick="login()">Sign In</button>
      </div>

      <!-- REGISTER -->
      <div class="form-section" id="tab-register">
        <h2>Create account</h2>
        <p class="subtitle">It's free and takes less than a minute</p>

        <div class="field">
          <label>Full Name</label>
          <input id="regName" type="text" placeholder="Jane Smith">
        </div>
        <div class="field">
          <label>Email Address</label>
          <input id="regEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="regPassword" type="password" placeholder="Min. 6 characters">
        </div>
        <button class="btn-primary" id="registerBtn" onclick="register()">Create Account</button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./config.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Please wait…' : btn.dataset.label;
    }

    document.getElementById('loginBtn').dataset.label = 'Sign In';
    document.getElementById('registerBtn').dataset.label = 'Create Account';

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showToast('Please fill in all fields.');

      setLoading('loginBtn', true);
      try {
        const res = await fetch(`${ENV.API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) return showToast(data.message || 'Login failed.');
        localStorage.setItem('token', data.token);
        showToast('Logged in! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/home/', 1000);
      } catch (e) {
        showToast('Network error. Please try again.');
      } finally {
        setLoading('loginBtn', false);
      }
    }

    async function register() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!name || !email || !password) return showToast('Please fill in all fields.');
      if (password.length < 6) return showToast('Password must be at least 6 characters.');

      setLoading('registerBtn', true);
      try {
        const res = await fetch(`${ENV.API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) return showToast(data.message || 'Registration failed.');
        showToast('Account created! Please sign in.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } catch (e) {
        showToast('Network error. Please try again.');
      } finally {
        setLoading('registerBtn', false);
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/home/';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.form-section.active').id;
        active === 'tab-login' ? login() : register();
      }
    });
  </script>

</body>
</html>
