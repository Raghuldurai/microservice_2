<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStore — Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --cream: #f7f3ee;
      --warm: #ede6dc;
      --accent: #c8692a;
      --accent-dark: #a3521e;
      --muted: #8a7f74;
      --border: #ddd7cf;
      --white: #ffffff;
      --card-shadow: 0 2px 12px rgba(15,14,12,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--ink);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--cream);
    }

    .brand span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-user {
      font-size: 13px;
      color: #8a8480;
    }

    .nav-user strong { color: var(--cream); }

    .btn-logout {
      padding: 8px 18px;
      background: transparent;
      border: 1.5px solid #3a3733;
      border-radius: 5px;
      color: #a09890;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* HERO */
    .hero {
      background: var(--ink);
      padding: 48px 48px 52px;
      border-bottom: 1px solid #1e1c1a;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(200,105,42,0.12) 0%, transparent 60%);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      color: var(--cream);
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .hero h1 em { font-style: italic; color: var(--accent); }

    .hero p {
      font-size: 14px;
      color: #6a6460;
      position: relative;
      z-index: 1;
    }

    /* TOOLBAR */
    .toolbar {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--cream);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }

    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }

    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

    .products-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* GRID */
    .main {
      padding: 36px 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(15,14,12,0.14);
      border-color: var(--border);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--warm);
    }

    .card-img-placeholder {
      width: 100%;
      height: 200px;
      background: var(--warm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 48px;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-category {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
    }

    .card-price span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .card-stock {
      font-size: 12px;
      color: var(--muted);
    }

    .in-stock { color: #27673a; font-weight: 500; }
    .low-stock { color: #c8692a; font-weight: 500; }

    /* STATES */
    .state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .state-icon { font-size: 48px; margin-bottom: 16px; }
    .state h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); margin-bottom: 8px; }
    .state p { font-size: 14px; }

    /* Skeleton loader */
    .skeleton {
      background: var(--white);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
    }

    .skel-img {
      height: 200px;
      background: linear-gradient(90deg, var(--warm) 25%, var(--cream) 50%, var(--warm) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .skel-body { padding: 16px 18px 18px; }
    .skel-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--warm) 25%, var(--cream) 50%, var(--warm) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 10px;
    }

    .skel-line.short { width: 40%; }
    .skel-line.med { width: 70%; }

    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #c0392b; color: white; }

    @media (max-width: 768px) {
      nav, .hero, .toolbar, .main { padding-left: 20px; padding-right: 20px; }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">My<span>Store</span></div>
    <div class="nav-right">
      <div class="nav-user">Hello, <strong id="userName">…</strong></div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Discover <em>great</em> products.</h1>
    <p id="productSummary">Loading catalogue…</p>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="text" placeholder="Search products…" oninput="filterProducts()">
    </div>
    <div class="filter-pills" id="categoryPills">
      <button class="pill active" onclick="setCategory('', this)">All</button>
    </div>
    <div class="products-count" id="countLabel"></div>
  </div>

  <main class="main">
    <div class="grid" id="grid"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="./config.js"></script>
  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/";

    let allProducts = [];
    let activeCategory = "";

    // Decode JWT to get user name
    try {
      const payload = JSON.parse(atob(token.split(".")[1]));
      document.getElementById("userName").textContent = payload.name || payload.email || "there";
    } catch (e) {}

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast error show";
      setTimeout(() => t.classList.remove("show"), 3500);
    }

    function renderSkeletons(count = 6) {
      const grid = document.getElementById("grid");
      grid.innerHTML = Array(count).fill(`
        <div class="skeleton">
          <div class="skel-img"></div>
          <div class="skel-body">
            <div class="skel-line short"></div>
            <div class="skel-line med"></div>
            <div class="skel-line"></div>
          </div>
        </div>`).join("");
    }

    function buildCategoryPills(products) {
      const cats = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
      const container = document.getElementById("categoryPills");
      container.innerHTML = `<button class="pill active" onclick="setCategory('', this)">All</button>`;
      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "pill";
        btn.textContent = cat;
        btn.onclick = () => setCategory(cat, btn);
        container.appendChild(btn);
      });
    }

    function setCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      filterProducts();
    }

    function filterProducts() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      let filtered = allProducts;
      if (activeCategory) filtered = filtered.filter(p => p.category === activeCategory);
      if (q) filtered = filtered.filter(p =>
        p.name.toLowerCase().includes(q) || (p.description || "").toLowerCase().includes(q)
      );
      renderProducts(filtered);
    }

    function stockLabel(stock) {
      if (stock > 10) return `<span class="in-stock">In stock</span>`;
      if (stock > 0) return `<span class="low-stock">Only ${stock} left</span>`;
      return `<span style="color:#c0392b;font-weight:500">Out of stock</span>`;
    }

    function renderProducts(products) {
      const grid = document.getElementById("grid");
      document.getElementById("countLabel").textContent =
        `${products.length} product${products.length !== 1 ? "s" : ""}`;

      if (!products.length) {
        grid.innerHTML = `
          <div class="state" style="grid-column:1/-1">
            <div class="state-icon">🔍</div>
            <h3>Nothing found</h3>
            <p>Try a different search term or category.</p>
          </div>`;
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="card">
          ${p.image
            ? `<img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ""}
          <div class="card-img-placeholder" ${p.image ? 'style="display:none"' : ""}>🛍️</div>
          <div class="card-body">
            <div class="card-category">${p.category || "General"}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.description || "No description available."}</div>
            <div class="card-footer">
              <div class="card-price">$${Number(p.price).toFixed(2)}</div>
              <div class="card-stock">${stockLabel(p.stock ?? 99)}</div>
            </div>
          </div>
        </div>`).join("");
    }

    async function loadProducts() {
      renderSkeletons();
      try {
        const res = await fetch(`${ENV.API_URL}/products`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (res.status === 401) {
          localStorage.removeItem("token");
          window.location.href = "/";
          return;
        }

        if (!res.ok) throw new Error("Failed to load products");

        allProducts = await res.json();

        const summary = `${allProducts.length} items available`;
        document.getElementById("productSummary").textContent = summary;

        buildCategoryPills(allProducts);
        renderProducts(allProducts);
      } catch (e) {
        document.getElementById("grid").innerHTML = `
          <div class="state" style="grid-column:1/-1">
            <div class="state-icon">⚠️</div>
            <h3>Could not load products</h3>
            <p>Please check your connection and try again.</p>
          </div>`;
        showToast("Failed to fetch products");
      }
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/";
    }

    loadProducts();
  </script>

</body>
</html>
