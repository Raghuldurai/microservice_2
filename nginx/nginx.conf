events {}

http {

  resolver 127.0.0.11 valid=30s;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    set $home_api "http://home-service:5002";
    set $auth_api "http://backend:5001";

    # Must come before /api to avoid prefix conflict
    location ^~ /api/products {
      proxy_pass $home_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
      proxy_pass $auth_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # home-service frontend
    # Trailing slash on BOTH sides strips /home prefix before forwarding
    # home-frontend receives / instead of /home/ — this is what fixes the 502
    location /home/ {
      proxy_pass http://home-frontend:3001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # login-service frontend
    location / {
      proxy_pass http://login-frontend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

}