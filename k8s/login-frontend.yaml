apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-frontend
  template:
    metadata:
      labels:
        app: login-frontend
    spec:
      containers:
      - name: login-frontend
        image: login-frontend:latest 
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: login-frontend
spec:
  selector:
    app: login-frontend
  ports:
  - port: 3000
    targetPort: 3000